@import "tailwindcss" source(none);
@source "../src";
@import "tw-animate-css";

@custom-variant dark (&:is(.dark *));

@theme inline {
  --radius-sm: calc(var(--radius) - 4px);
  --radius-md: calc(var(--radius) - 2px);
  --radius-lg: var(--radius);
  --radius-xl: calc(var(--radius) + 4px);
  --color-background: var(--background);
  --color-foreground: var(--foreground);
  --color-card: var(--card);
  --color-card-foreground: var(--card-foreground);
  --color-muted: var(--muted);
  --color-muted-foreground: var(--muted-foreground);
  --color-border: var(--border);
  --color-input: var(--input);
  --color-ring: var(--ring);
  --color-primary: var(--primary);
  --color-primary-foreground: var(--primary-foreground);
  --color-accent: var(--accent);
  --color-accent-foreground: var(--accent-foreground);
  --color-destructive: var(--destructive);
  --color-destructive-foreground: var(--destructive-foreground);
  --color-success: var(--success);
  --color-success-foreground: var(--success-foreground);
}

:root {
  --radius: 0.75rem;
  --background: oklch(0.16 0.02 265);
  --foreground: oklch(0.97 0.005 250);
  --card: oklch(0.21 0.025 265);
  --card-foreground: oklch(0.97 0.005 250);
  --muted: oklch(0.26 0.025 265);
  --muted-foreground: oklch(0.72 0.02 258);
  --border: oklch(0.32 0.03 265);
  --input: oklch(0.24 0.025 265);
  --ring: oklch(0.72 0.18 295);
  --primary: oklch(0.72 0.18 295);
  --primary-foreground: oklch(0.12 0.02 265);
  --accent: oklch(0.78 0.17 200);
  --accent-foreground: oklch(0.12 0.02 265);
  --destructive: oklch(0.65 0.22 25);
  --destructive-foreground: oklch(0.98 0 0);
  --success: oklch(0.75 0.17 155);
  --success-foreground: oklch(0.12 0.02 265);
  --gradient-brand: linear-gradient(135deg, oklch(0.72 0.18 295) 0%, oklch(0.78 0.17 200) 100%);
  --gradient-surface: linear-gradient(180deg, oklch(0.21 0.025 265) 0%, oklch(0.18 0.025 265) 100%);
  --shadow-glow: 0 0 40px -8px oklch(0.72 0.18 295 / 0.4);
  --shadow-card: 0 8px 30px -12px oklch(0.05 0.02 265 / 0.6);
}

@layer base {
  * {
    border-color: var(--color-border);
  }
  body {
    background: radial-gradient(ellipse at top, oklch(0.22 0.05 285) 0%, oklch(0.14 0.02 265) 55%) fixed;
    color: var(--color-foreground);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans Bengali", sans-serif;
  }
}

@utility bg-gradient-brand {
  background-image: var(--gradient-brand);
}
@utility bg-gradient-surface {
  background-image: var(--gradient-surface);
}
@utility shadow-glow {
  box-shadow: var(--shadow-glow);
}
@utility shadow-card {
  box-shadow: var(--shadow-card);
}
@utility text-gradient {
  background-image: var(--gradient-brand);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

#lovable-badge,
#lovable-badge * {
  display: none !important;
  visibility: hidden !important;
  pointer-events: none !important;
}
